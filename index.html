<!DOCTYPE html>
<html>
<head>
  <title>Shadi Ka Test 💍😂</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 60px;

      /* 🌹 Rose/Pink background */
      background: linear-gradient(135deg, #ffe6f0, #ffb6c1, #ff69b4);
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 28px;
      color: #8b004f;
    }

    /* BIG QUESTION TEXT */
    #question {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #4b004b;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #yesBtn {
      background: #28a745;
      color: white;
    }

    #noBtn {
      background: #dc3545;
      color: white;
      position: absolute;
    }

    #msg {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
      color: #8b004f;
    }
  </style>
</head>

<body>

<h1>💍 शादी का छोटा सा टेस्ट 😄</h1>

<p id="question">क्या तुम मानते हो मैं सबसे अच्छा इंसान हूँ? 😏</p>

<button id="yesBtn" onclick="nextQuestion()">हाँ 💕</button>
<button id="noBtn" onmouseover="runAway()">नहीं 🙈</button>

<div id="msg"></div>

<script>
let step = 0;

const questions = [
  "क्या तुम मानते हो मैं सबसे अच्छा इंसान हूँ? 😏",
  "क्या तुम मेरे साथ अपना खाना शेयर करोगे? 🍕😂",
  "क्या तुम मेरी बोरिंग मूवी भी देखोगे? 🎬",
  "क्या तुम मेरे फालतू जोक्स सह लोगे? 😭",
  "क्या तुम मेरे फ्राइज कभी नहीं चुराओगे? 🍟👀",
  "आख़िरी सवाल: क्या तुम मुझसे शादी करोगे? 💍😳"
];

function nextQuestion() {
  step++;

  if (step < questions.length) {
    document.getElementById("question").innerText = questions[step];
  } else {
    document.getElementById("question").innerText = "अब फैसला करो 😏";
    document.getElementById("msg").innerText =
      "अगर यहाँ तक आ गए हो… तो YES बोलना ही पड़ेगा 💍😂";
  }
}

function runAway() {
  const btn = document.getElementById("noBtn");
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
