<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Proof Proposal Game 💍</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  .box {
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 350px;
    position: relative;
  }

  .question {
    font-size: 20px;
    margin-bottom: 20px;
    min-height: 60px;
  }

  .answer {
    font-size: 22px;
    color: green;
    font-weight: bold;
    margin-top: 20px;
    display: none;
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  button {
    padding: 10px 20px;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    margin: 5px;
    transition: all 0.2s ease;
  }

  .yesBtn {
    background: hotpink;
  }

  .yesBtn:hover {
    background: deeppink;
    transform: scale(1.05);
  }

  .noBtn {
    background: gray;
    position: absolute;
    left: 200px;
    top: 120px;
    transition: left 0.15s ease, top 0.15s ease;
    touch-action: none;
  }

  .confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: 0;
    z-index: 999;
  }
</style>
</head>

<body>

<div class="box" id="box">
  <div class="question" id="question">Hello Muskan My Madam ji 💖💍</div>

  <button class="yesBtn" id="yesBtn">YES 💖</button>
  <button class="noBtn" id="noBtn">NO 😏</button>

  <div class="answer" id="answer"></div>
</div>

<script>
const questions = [
  "क्या आप मानते हैं मैं आपके लिए best हूँ? 😏",
  "क्या आप मेरे साथ food share करेंगे? 🍕😂",
  "क्या आप मेरी boring movie देखेंगे? 🎬",
  "क्या आप मेरे jokes झेलेंगे? 😭",
  "आख़िरी सवाल: क्या आप मुझसे शादी करेंगे? 💍😳"
];

let index = 0;
let started = false;

const questionEl = document.getElementById("question");
const noBtn = document.getElementById("noBtn");
const box = document.getElementById("box");
const answerEl = document.getElementById("answer");
const yesBtn = document.getElementById("yesBtn");

function loadQuestion() {
  questionEl.innerText = questions[index];
}

// YES button 💖
yesBtn.addEventListener("click", () => {

  if (!started) {
    started = true;
    index = 0;
    loadQuestion();
    return;
  }

  if (index < questions.length - 1) {
    index++;
    loadQuestion();
  } else {
    showResult();
  }
});

// NO escape (desktop + mobile)
noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", moveNo);
noBtn.addEventListener("touchstart", function(e) {
  e.preventDefault();
  moveNo();
}, { passive: false });

function moveNo() {
  const maxX = box.clientWidth - noBtn.offsetWidth;
  const maxY = box.clientHeight - noBtn.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// RESULT 💍
function showResult() {
  questionEl.innerText = "💍 Proposal Complete!";
  answerEl.style.display = "block";
  answerEl.innerText = "❤️ Madam ji said YES! 💍 Forever ❤️";

  yesBtn.style.display = "none";
  noBtn.style.display = "none";

  celebrate();
}

// CONFETTI 🎉
function celebrate() {
  for (let i = 0; i < 60; i++) {
    const c = document.createElement("div");
    c.classList.add("confetti");

    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.background = ["#ff0", "#f0f", "#0ff", "#fff", "#f66"][Math.floor(Math.random()*5)];

    document.body.appendChild(c);

    c.animate([
      { transform: "translateY(0)" },
      { transform: `translateY(${window.innerHeight}px)` }
    ], {
      duration: 2000 + Math.random() * 2000
    });

    setTimeout(() => c.remove(), 3000);
  }
}
</script>

</body>
</html>
