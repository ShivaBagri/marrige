<!DOCTYPE html>
<html>
<head>
  <title>Serious Marriage Application 💍</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 60px;
      background: #fff0f5;
    }

    h1 {
      font-size: 28px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #yesBtn {
      background: #28a745;
      color: white;
    }

    #noBtn {
      background: #dc3545;
      color: white;
      position: absolute;
    }

    #msg {
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
      color: #ff1493;
    }
  </style>
</head>
<body>

<h1>💍 Marriage Compatibility Test</h1>

<p id="question">Do you agree I am the best person ever? 😏</p>

<button id="yesBtn" onclick="nextQuestion()">Yes 💕</button>
<button id="noBtn" onmouseover="runAway()">No 🙈</button>

<div id="msg"></div>

<script>
let step = 0;

const questions = [
  "Do you agree I am the best person ever? 😏",
  "Will you share your food with me? 🍕😂",
  "Will you watch my favorite movie even if it's boring? 🎬",
  "Will you tolerate my bad jokes forever? 😭",
  "Promise to never steal my fries? 🍟👀",
  "Final question: Will you marry me? 💍😳"
];

function nextQuestion() {
  step++;

  if (step < questions.length) {
    document.getElementById("question").innerText = questions[step];
  } else {
    document.getElementById("question").innerText = "Decision time 😏";
    document.getElementById("msg").innerText =
      "If you reached here… you HAVE to say YES 💍😂";
  }
}

function runAway() {
  const btn = document.getElementById("noBtn");
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
