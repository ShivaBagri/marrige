<!DOCTYPE html>
<html>
<head>
  <title>Important Question 💍</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 80px;
      background: #fff0f5;
    }

    h1 {
      font-size: 32px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #yesBtn {
      background-color: #28a745;
      color: white;
    }

    #noBtn {
      background-color: #dc3545;
      color: white;
      position: absolute;
    }

    #msg {
      margin-top: 30px;
      font-size: 22px;
      font-weight: bold;
      color: #ff1493;
    }
  </style>
</head>
<body>

<h1>💍 I have a serious question...</h1>
<p>Think carefully 😏</p>

<button id="yesBtn" onclick="sayYes()">Yes 💕</button>
<button id="noBtn" onmouseover="runAway()">No 🙈</button>

<div id="msg"></div>

<script>
function sayYes() {
  document.getElementById("msg").innerHTML =
    "YAY!!! 💍😂 Welcome to the chaos… I mean marriage ❤️";
}

function runAway() {
  const btn = document.getElementById("noBtn");
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
